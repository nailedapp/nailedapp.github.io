{{ define "main" }}
    <div class="blog-index">
        <div class="container">
            <h1>Blog</h1>
            <p class="blog-intro">Practical advice on breaking the nail-biting habit, backed by research and real experience.</p>
            <div class="blog-list">
                {{ range .Pages }}
                <article class="blog-card">
                    <a href="{{ .Permalink }}">
                        <h2>{{ .Title }}</h2>
                        <p>{{ .Description }}</p>
                        <span class="blog-meta">{{ .Date.Format "2 January 2006" }} · {{ .ReadingTime }} min read</span>
                    </a>
                </article>
                {{ end }}
            </div>
        </div>
    </div>
{{ end }}
